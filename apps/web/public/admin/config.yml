backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'içerik: "{{title}}" yayınlandı'
    update: 'içerik: "{{title}}" güncellendi'
    delete: 'içerik: "{{title}}" silindi'
    uploadMedia: "medya: {{path}} yüklendi"
    deleteMedia: "medya: {{path}} silindi"

locale: tr
media_folder: apps/web/public/images/uploads
public_folder: /images/uploads

collections:
  # ── METİNLER ──────────────────────────────────────────────
  - name: posts
    label: Metinler
    label_singular: Metin
    folder: apps/web/content/posts
    create: true
    slug: "{{slug}}"
    slug_length: 60
    preview_path: "metin/{{slug}}"
    summary: "{{title}} — {{author}} ({{date}})"
    sortable_fields: ["date", "title", "author", "type"]
    fields:
      - label: Başlık
        name: title
        widget: string

      - label: Yazar
        name: author
        widget: string

      - label: Tür
        name: type
        widget: select
        options:
          - { label: Deneme, value: deneme }
          - { label: Şiir, value: siir }
          - { label: Hikaye, value: hikaye }
          - { label: Söyleşi, value: soylesi }
          - { label: Çeviri, value: ceviri }

      - label: Yayın Tarihi
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false

      - label: Kapak Görseli
        name: image
        widget: image
        required: false
        hint: "Opsiyonel — kart ve sayfa başlığında görünür"

      - label: Kısa Özet
        name: excerpt
        widget: text
        hint: "Kart üzerinde görünecek özet (2-3 cümle)"

      - label: İçerik
        name: body
        widget: markdown
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
        editor_components: []

  # ── SAYFALAR ──────────────────────────────────────────────
  - name: pages
    label: Sayfalar
    files:
      # Hakkında
      - name: hakkinda
        label: Hakkında Sayfası
        file: apps/web/content/hakkinda.json
        fields:
          - label: Açılış Cümlesi
            name: acisCumlesi
            widget: text
            hint: "Sayfanın üstünde italik görünen cümle"

          - label: Ana Paragraflar
            name: paragraflar
            widget: list
            label_singular: Paragraf
            hint: "Her satır ayrı bir paragraf olarak görünür"
            field:
              label: Paragraf
              name: paragraf
              widget: text

          - label: Yan Panel Bilgileri
            name: bilgiler
            widget: object
            fields:
              - { label: Yayınevi, name: yayinevi, widget: string }
              - { label: Kuruluş Yılı, name: kurulus, widget: string }
              - { label: Dil, name: dil, widget: string }
              - { label: Format, name: format, widget: string }

          - label: Önceki Yayınlar
            name: oncekiYayinlar
            widget: list
            label_singular: Yayın
            fields:
              - { label: Yıllar, name: yillar, widget: string, hint: "örn: 2022 — 2024" }
              - { label: İsim, name: isim, widget: string }
              - { label: Açıklama, name: aciklama, widget: text }

      # İletişim
      - name: iletisim
        label: İletişim Sayfası
        file: apps/web/content/iletisim.json
        fields:
          - label: Açılış Cümlesi
            name: acisCumlesi
            widget: text

          - label: Genel İletişim E-postası
            name: iletisimEmail
            widget: string

          - label: Yazı Gönderimi E-postası
            name: yaziEmail
            widget: string

          - label: Instagram Kullanıcı Adı
            name: instagram
            widget: string
            hint: "@ işareti olmadan yazın"

          - label: Yazı Gönderimi Kuralları
            name: kurallar
            widget: list
            label_singular: Kural
            field:
              label: Kural
              name: kural
              widget: text

      # Site Ayarları
      - name: site
        label: Site Ayarları
        file: apps/web/content/settings.json
        fields:
          - label: Ana Sayfa Altyazısı
            name: altyazi
            widget: string
            hint: "KASPAR HAUSER başlığının altındaki italik metin"

          - label: Yayınevi Adı
            name: yayinevi
            widget: string
            hint: "Altyazının altındaki küçük metin"

          - label: Site Açıklaması
            name: description
            widget: text
            hint: "Arama motorlarında görünür"

          - label: Genel İletişim E-postası
            name: contactEmail
            widget: string

          - label: Yazı Gönderimi E-postası
            name: submissionEmail
            widget: string

          - label: Instagram Kullanıcı Adı
            name: instagram
            widget: string
